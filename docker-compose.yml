version: "3.8"

networks:
  anon-net:
    driver: bridge

volumes:
  om_mysql_data:
  om_es_data:
  minio_data:
  pulsar_data:
  nessie_data:

services:

  # ── OpenMetadata: MySQL ────────────────────────────────────────────────────
  om_mysql:
    image: mysql:8.0
    networks: [anon-net]
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
    volumes:
      - om_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── OpenMetadata: Elasticsearch ────────────────────────────────────────────
  om_elasticsearch:
    image: elasticsearch:8.10.2
    networks: [anon-net]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - om_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── OpenMetadata Server ────────────────────────────────────────────────────
  openmetadata:
    image: openmetadata/server:1.3.0
    networks: [anon-net]
    depends_on:
      om_mysql:
        condition: service_healthy
      om_elasticsearch:
        condition: service_healthy
    environment:
      # Database
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_HOST: om_mysql
      DB_PORT: "3306"
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      OM_DATABASE: openmetadata_db
      # Elasticsearch
      ELASTICSEARCH_HOST: om_elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      # No-auth mode for MoC
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.NoopAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.NoopAuthenticationMechanism
      AUTHENTICATION_PROVIDER: no-auth
      SERVER_HOST_API_URL: http://openmetadata:8585/api
    ports:
      - "8585:8585"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8585/api/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── Apache Pulsar (standalone) ─────────────────────────────────────────────
  pulsar:
    image: apachepulsar/pulsar:3.1.0
    networks: [anon-net]
    command: bin/pulsar standalone
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
    volumes:
      - pulsar_data:/pulsar/data
    ports:
      - "6650:6650"   # broker
      - "8080:8080"   # admin UI
    healthcheck:
      test: ["CMD-SHELL", "bin/pulsar-admin brokers healthcheck 2>/dev/null || curl -sf http://localhost:8080/admin/v2/brokers/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MinIO (S3-compatible object storage for Iceberg) ──────────────────────
  minio:
    image: minio/minio:latest
    networks: [anon-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc:latest
    networks: [anon-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/iceberg-warehouse --ignore-existing &&
        mc mb local/flink-checkpoints --ignore-existing &&
        echo 'MinIO buckets ready'
      "

  # ── Project Nessie (Iceberg REST Catalog) ─────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.74.0
    networks: [anon-net]
    environment:
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    ports:
      - "19120:19120"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Apache Flink: JobManager ───────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    networks: [anon-net]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path.style.access: true
      # Job env vars
      PULSAR_SERVICE_URL: pulsar://pulsar:6650
      PULSAR_ADMIN_URL: http://pulsar:8080
      OM_BASE_URL: http://openmetadata:8585/api
      TABLE_FQN: sample_data.default.default.users
      ANONYMIZATION_SECRET: mocksecret-change-in-prod
    ports:
      - "8081:8081"   # Flink Web UI
    depends_on:
      pulsar:
        condition: service_healthy
      openmetadata:
        condition: service_healthy
      nessie:
        condition: service_healthy

  # ── Apache Flink: TaskManager ──────────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    networks: [anon-net]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path.style.access: true
    depends_on:
      - flink-jobmanager
